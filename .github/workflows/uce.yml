name: UCE Compliance

on:
  pull_request:
    branches: [main]
    paths:
      - 'stateweave/**'
      - 'tests/**'
      - 'scripts/uce.py'

jobs:
  uce-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run UCE compliance scan
        run: |
          python scripts/uce.py --mode=CI --json | tee uce-report.json

      - name: Upload UCE report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uce-report
          path: uce-report.json

      - name: Check UCE result
        run: |
          python -c "
          import json, sys
          with open('uce-report.json') as f:
              # Find the JSON block in the output
              content = f.read()
              start = content.index('{')
              data = json.loads(content[start:])
          if not data.get('overall_pass'):
              print('❌ UCE COMPLIANCE FAILURE')
              for s in data.get('scanners', []):
                  if not s['passed'] and s['mode'] == 'BLOCK':
                      print(f'  BLOCK: {s[\"scanner\"]} — {s[\"violations\"]}')
              sys.exit(1)
          print('✅ UCE COMPLIANCE PASSED')
          "
